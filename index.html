            font-weight: bold;

        }

            border-radius: 4px;

            margin-bottom: 12px;
            font-weight: bold;

            background: #e2e8f0;

            border-radius: 5px;

            padding: 0;
            margin: 0;
        }

        .option-item {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;

            display: flex;
            align-items: center;

            background-color: #f1f3f5;
            border-color: #b1bbc4;
        }

        .option-item.correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
            font-weight: bold;
        }

        .option-item.wrong {

            border-color: #f5c6cb !important;
            color: #721c24;

            padding-top: 15px;

            background-color: var(--primary-color);

            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;

            font-size: 14px;
            color: #555;

            padding: 12px;

            color: #155724;

            background-color: #f8d7da;
            color: #721c24;
            border-right: 4px solid var(--danger-color);

</head>

    let currentQuestions = [];
    let currentIndex = 0;

    function switchGroup(start, end) {
        const tabs = document.querySelectorAll('.tab-btn');
        if (start === 1) {
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }

        currentQuestions = allQuestions.filter(q => q.id >= start && q.id <= end);
        currentIndex = 0;
        
        renderQuestions();
        showQuestion(currentIndex);
    }

    function renderQuestions() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        currentQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = `question-card ${index === 0 ? 'active' : ''}`;
            card.id = `q-card-${index}`;

            // توليد زر التحكم بالملاحظة وصندوق الملاحظة المخفي تلقائياً
            let explainHtml = '';
            if (q.explain) {
                explainHtml = `
                    <button class="toggle-explain-btn" onclick="toggleExplanation(${index})">
                        👁️ إظهار/إخفاء الملاحظة الهندسية والرموز
                    </button>
                    <div id="explain-box-${index}" class="symbol-explain">${q.explain}</div>
                `;
            }

            let optionsHtml = '';
            q.options.forEach((opt, optIdx) => {
                optionsHtml += `<li class="option-item" onclick="checkAnswer(${index}, ${optIdx}, this)">${opt}</li>`;
            });

            card.innerHTML = `
                <div class="question-text">${q.id}. ${q.text}</div>
                ${explainHtml}
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
                <div id="feedback-${index}" class="feedback-box"></div>
            `;
            container.appendChild(card);
        });
    }

    // دالة التحكم في إظهار وإخفاء الملاحظة بشكل تفاعلي سلس
    function toggleExplanation(index) {
        const explainBox = document.getElementById(`explain-box-${index}`);
        if (explainBox.style.display === "block") {
            explainBox.style.display = "none";
        } else {
            explainBox.style.display = "block";
        }
    }

    function showQuestion(index) {
        const cards = document.querySelectorAll('.question-card');
        cards.forEach(card => card.classList.remove('active'));

        const activeCard = document.getElementById(`q-card-${index}`);
        if (activeCard) {
            activeCard.classList.add('active');
        }

        document.getElementById('progress-indicator').innerText = `السؤال المفتوح حالياً رقم: ${currentQuestions[index].id} من 100`;

        document.getElementById('prev-btn').disabled = (index === 0);
        document.getElementById('next-btn').disabled = (index === currentQuestions.length - 1);
    }

    function changeQuestion(step) {
        currentIndex += step;
        if (currentIndex >= 0 && currentIndex < currentQuestions.length) {
            showQuestion(currentIndex);
        }
    }

    function checkAnswer(qIdx, selectedOptIdx, element) {
        const currentQ = currentQuestions[qIdx];
        const card = document.getElementById(`q-card-${qIdx}`);
        const options = card.querySelectorAll('.option-item');
        const feedbackBox = document.getElementById('feedback-' + qIdx);

        if (card.classList.contains('answered')) return;
        card.classList.add('answered');

        // إظهار الملاحظة تلقائياً عند حل السؤال كدعم تعليمي إضافي
        const explainBox = document.getElementById(`explain-box-${qIdx}`);
        if (explainBox) {
            explainBox.style.display = "block";
        }

        if (selectedOptIdx === currentQ.answer) {
            element.classList.add('correct');
            feedbackBox.className = "feedback-box correct";
            feedbackBox.innerHTML = `<b>✨ إجابة صحيحة وممتازة!</b><br>${currentQ.feedback}`;
        } else {
            element.classList.add('wrong');
            options[currentQ.answer].classList.add('correct');
            feedbackBox.className = "feedback-box wrong";
            feedbackBox.innerHTML = `<b>⚠️ عذراً، الإجابة غير دقيقة!</b><br>${currentQ.feedback}`;
        }
    }

    window.onload = function() {
        switchGroup(1, 50);
    };
</script>
